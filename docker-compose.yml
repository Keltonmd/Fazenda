services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    environment:
      APP_ENV: dev
      APP_DEBUG: "1"
      COMPOSER_ALLOW_SUPERUSER: "1"
      APP_AUTO_MIGRATE: "1"
      APP_AUTO_SCHEMA_UPDATE: "1"
      APP_WAIT_FOR_DB: "1"
      APP_DB_WAIT_RETRIES: "60"
      APP_DB_WAIT_INTERVAL: "2"
      DATABASE_HOST: db
      DATABASE_PORT: "3306"
      DATABASE_NAME: fazenda
      DATABASE_USER: app
      DATABASE_PASSWORD: app
    depends_on:
      - db

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www:ro
      - ./docker/nginx/default.conf:/etc/nginx/templates/default.conf.template:ro
    depends_on:
      - app

  db:
    image: mysql:8.4
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fazenda
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "MYSQL_PWD=\"$${MYSQL_ROOT_PASSWORD}\" mysqladmin ping -h 127.0.0.1 -uroot --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  db_data:
